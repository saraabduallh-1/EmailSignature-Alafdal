    <main class="container">
      <!-- Header: عنوان بسيط -->
       
      <header class="header">
        <div class="header-row">
          <img src="./assets/logo.png" class="header-logo" alt="logo" />

            <h1>توقيع إيميل شركة الأفضل </h1>

      <section class="layout">

            <span id ="info">أضِف بياناتك</span>

<input id="jobInput" placeholder="المسمى الوظيفي">

<input id="addressInput" placeholder="العنوان">

<input id="phoneInput" placeholder="رقم الجوال">

<input id="websiteInput" placeholder="الموقع الإلكتروني">


          </label>

          <!-- محاذاة النص -->


          <!-- زر تحميل PNG -->
          <button id="downloadBtn" class="btn primary">تحميل التوقيع  PNG</button>

          
          <!-- زر نسخ رابط ذكي -->
          <button id="copyLinkBtn" class="btn secondary">
            مشاركة رابط إنشاء التوقيع
          </button>

          <button
  class="btn primary"
  onclick="window.open('https://alafdal-eid-cards.vercel.app','_blank')"
>
 موقع إنشاء التهنئة 
</button>
<br>
          <!-- رسالة صغيرة للعميل -->
          <center><small id="status" class="status"
          
          </style>
        
          </small>
        </aside>
        </center>


        <!-- Preview: معاينة القالب والاسم -->
        <div class="preview">
          <!-- Canvas: مساحة الرسم (نفس مقاس القالب 1080×1920) -->
          <canvas id="canvas" width="1080" height="1920"></canvas>



        </div>

      </section>
